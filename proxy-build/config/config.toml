# =============================================================================
# Edge Gateway self-hosted proxy config — Pangolin/frp/NetBird
# Zero Cloudflare dependencies. Fully self-contained proxy hosting pipeline.
# 
# This config is loaded by proxy-manager.js at startup.
# Tunnels defined here auto-start when the container boots.
# =============================================================================

# ── Server bind (main proxy entrypoint) ──────────────────────────────────────
[server]
bindAddr = "0.0.0.0"
bindPort = 7000

# ── API (internal proxy-manager API for the gateway) ─────────────────────────
[api]
bindAddr = "127.0.0.1"
port = 7001

# ── Logging ──────────────────────────────────────────────────────────────────
[logging]
file = "/data/logs/proxy-server.log"
level = "info"
maxDays = 7

# ── Health check ────────────────────────────────────────────────────────────
[health]
path = "/health"
intervalSeconds = 30
timeoutSeconds = 5

# ── Gateway integration ─────────────────────────────────────────────────────
[gateway]
apiPort = 8787
healthPath = "/health"
corsOrigins = ["*"]

# ── Auth ────────────────────────────────────────────────────────────────────
[auth]
apiKey = "${API_KEY:-}"
token = "${PROXY_TOKEN:-}"

# ── Proxy tunnels ───────────────────────────────────────────────────────────
# Each [[proxies]] block defines a self-hosted reverse-proxy tunnel.
# The Edge Gateway routes traffic through these to your targets.
#
# Supported types: "tcp", "http"
#
# Example: tunnel a local dev server through the proxy
# [[proxies]]
# name = "dev-api"
# type = "tcp"
# localIP = "127.0.0.1"
# localPort = 3000
# remotePort = 6000
# autoStart = true
#
# Example: HTTP reverse proxy with custom domain
# [[proxies]]
# name = "web-app"
# type = "http"
# localIP = "127.0.0.1"
# localPort = 8080
# remotePort = 8080
# autoStart = true

# ── NetBird mesh network (optional) ─────────────────────────────────────────
# Uncomment to enable NetBird peer-to-peer mesh networking.
# Requires netbird to be installed in the container.
#
# [netbird]
# enabled = false
# managementUrl = "https://api.netbird.io"
# setupKey = "${NETBIRD_SETUP_KEY:-}"
# peerPort = 51820
